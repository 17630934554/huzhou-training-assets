  polling:
    enabled: true
    batch_size: 20
    interval_sec: 120
    switch_gap: 5

model:
  path: "yolov8n.pt"
  helmet_model: "models/helmet_detect.pt"
  fire_smoke_model: "models/fire_smoke_detect.pt"
  device: "cpu"
  confidence: 0.55
  inference_fps: 1
  gpu_memory_limit: 0

scenes:
  fire_smoke:
    enabled: true
    model: "fire_smoke_model"
    classes: ["fire", "smoke"]
    cooldown: 60
    min_confidence: 0.5
    description: "fire/smoke detection"
  no_helmet:
    enabled: true
    model: "helmet_model"
    classes: ["no_helmet"]
    cooldown: 120
    min_confidence: 0.55
    description: "no helmet detection"
  fire_exit_block:
    enabled: true
    model: "path"
    classes: ["person"]
    zone: "fire_exit_zone"
    min_duration: 30
    cooldown: 300
    min_confidence: 0.5
    description: "fire exit blocked"
  forklift_intrude:
    enabled: true
    model: "path"
    classes: ["person"]
    zone: "forklift_zone"
    cooldown: 60
    min_confidence: 0.5
    description: "forklift zone intrusion"
  fire_ext_missing:
    enabled: false
    model: "path"
    classes: []
    cooldown: 600
    min_confidence: 0.5
    description: "fire ext missing"
  person_fall:
    enabled: false
    model: "path"
    classes: ["person"]
    cooldown: 120
    min_confidence: 0.5
    description: "person fall"
  cabinet_open:
    enabled: false
    model: "path"
    classes: []
    cooldown: 600
    min_confidence: 0.5
    description: "cabinet open"
  floor_liquid:
    enabled: false
    model: "path"
    classes: []
    cooldown: 600
    min_confidence: 0.5
    description: "floor liquid"
  unauth_area:
    enabled: false
